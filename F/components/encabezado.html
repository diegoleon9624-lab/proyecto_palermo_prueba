<!-- ENCABEZADO CON INFORMACIÓN DE LA EMPRESA -->
<div class="header">
  <!-- BOTÓN REGRESAR STICKY -->
  <button class="btn-regresar-header">
    <span class="btn-brillo"></span>
    <span class="btn-texto">Regresar</span>
  </button>

  <div class="header-info">
    <div class="info-item">
      <span class="info-label">Fecha</span>
      <span class="info-value" id="fecha-actual">--/--/----</span>
    </div>

    <div class="info-item">
      <span class="info-label">Hora</span>
      <span class="info-value" id="hora-actual">--:--:--</span>
    </div>

    <div class="info-item">
      <span class="info-label">No. Factura</span>
      <span class="info-value" id="numero-factura">---</span>
    </div>

    <div class="info-item">
      <span class="info-label">Vendedor</span>
      <span class="info-value" id="vendedor">---</span>
    </div>

    <div class="info-item">
      <span class="info-label">Teléfono</span>
      <span class="info-value" id="telefono">---</span>
    </div>

    <div class="info-item">
      <span class="info-label">NIT</span>
      <span class="info-value" id="nit">---</span>
    </div>
  </div>

  <div class="logo-empresa">
    <img src="imganes/logo1.png" alt="Logo Empresa" class="logo-img" />
  </div>
</div>
