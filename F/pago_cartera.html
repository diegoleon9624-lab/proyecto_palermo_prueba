<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InveFact - Consulta de Ventas</title>

    <!-- Tus estilos generales -->
    <link rel="stylesheet" href="estilosD1.css" />
  </head>

  <!-- ✅ AISLADO: esta clase activa solo el CSS/JS de esta pantalla -->
  <body class="app-body consulta-ventas-body" data-permiso="cartera">
    <div class="container">
      <!-- Sidebar cargado dinámicamente -->
      <div id="sidebar-container"></div>
      <!-- MAIN -->
      <div class="main-content">
        <!-- ENCABEZADO DINÁMICO -->
        <div id="header-container"></div>
        <div class="welcome-section cv-title">
          <h2>InveFact</h2>
          <p>PAGO DE CARTERAS</p>
        </div>

        <div class="pc-scope">
          <div class="pc-card">


            <div class="ac-search">
              <input
                type="text"
                placeholder="Digita el documento del cliente"
              />
              <button>Buscar</button>
            </div>

            <table class="pc-table">
              <thead>
                <tr>
                  <th>Fecha pago</th>
                  <th>N° Factura</th>
                  <th>Fecha factura</th>
                  <th>Valor Factura</th>
                  <th>Pagar</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>24/01/2026</td>
                  <td>0001120</td>
                  <td>15/12/2025</td>
                  <td>$1.535.263</td>
                  <td><input type="checkbox" /></td>
                </tr>
              </tbody>
            </table>

            <p>
              <strong
                >El pago debe ser igual a las facturas seleccionadas.</strong
              >
            </p>

            <div class="pc-pay">
              <input type="text" placeholder="Efectivo" />
              <input type="text" placeholder="Electrónico" />
              <input type="text" placeholder="Cambio / Devuelta" />
            </div>

            <textarea
              placeholder="Nota"
              style="width: 100%; height: 60px; margin-top: 10px"
            ></textarea>

            <button class="pc-btn">PAGO</button>
          </div>
        </div>
      </div>
    </div>
    <script src="logicajs/loadSidebar.js" defer></script>
    <script src="logicajs/loadheader.js" defer></script>
    <script src="logicajs/sidebar.js" defer></script>
    <script src="logicajs/regresar.js" defer></script>
    <script src="logicajs/header.js"></script>
    <script src="logicajs/roles.js"></script>
    <script src="logicajs/guard.js"></script>
  </body>
</html>
