<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InveFact - Vista de Registros</title>

    <!-- Estilos generales -->
    <link rel="stylesheet" href="estilosD1.css" />
  </head>

  <body class="app-body consulta-ventas-body" data-permiso="clientes">
    <div class="container">
      <!-- Sidebar -->
      <div id="sidebar-container"></div>

      <!-- MAIN -->
      <div class="main-content">
        <!-- Header -->
        <div id="header-container"></div>

        <!-- TÍTULO GENERAL -->
        <div class="welcome-section cv-title">
          <h2>InveFact</h2>
          <p id="subtitulo-modulo">VISTA DE USUARIOS</p>
        </div>

        <!-- CONTEXTO DEL MÓDULO -->
        <div class="modulo-contexto">
          <h3 id="titulo-modulo">LISTADO DE USUARIOS</h3>
        </div>

        <!-- ===============================
             VISTA USUARIOS / CLIENTES
        ================================ -->
        <div class="uc-scope">
          <div class="uc-card">

            <!-- FILTRO -->
            <div class="selector-tipo">
              <select class="uc-input" id="filtro_tipo">
                <option value="usuario">Usuarios</option>
                <option value="cliente">Clientes</option>
              </select>
            </div>

            <!-- BUSCADOR (CORREGIDO) -->
            <div class="uc-busqueda input-search">
              <input
                class="uc-input"
                id="inputBuscar"
                placeholder="Digita identificación"
              />
              <button
                type="button"
                class="search-icon"
                id="btnBuscar"
                aria-label="Buscar"
              >
                🔍
              </button>
            </div>

            <!-- TABLA -->
            <table class="uc-tabla">
              <thead id="tabla-head">
                <tr>
                  <th>NOMBRE COMPLETO</th>
                  <th>IDENTIFICACIÓN</th>
                  <th>CORREO</th>
                  <th id="col-extra">ROL</th>
                  <th>ACCIONES</th>
                </tr>
              </thead>

              <tbody id="tabla-body">
                <!-- JS cargará filas dinámicamente -->
              </tbody>
            </table>

          </div>
        </div>
      </div>
    </div>

    <!-- JS EXISTENTES -->
    <script src="logicajs/loadSidebar.js" defer></script>
    <script src="logicajs/loadheader.js" defer></script>
    <script src="logicajs/sidebar.js" defer></script>
    <script src="logicajs/regresar.js" defer></script>
    <script src="logicajs/header.js"></script>
    <script src="logicajs/roles.js"></script>
    <script src="logicajs/guard.js"></script>
    <!-- JS DE LÓGICA -->
    <script src="logicajs/registros.js" defer></script>
  </body>
</html>
