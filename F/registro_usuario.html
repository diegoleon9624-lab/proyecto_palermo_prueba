<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InveFact - Registro Usuario</title>

    <!-- Tus estilos generales -->
    <link rel="stylesheet" href="estilosD1.css" />
  </head>

  <!-- ✅ AISLADO -->
  <body class="app-body consulta-ventas-body body-registro" data-permiso="clientes">
    <div class="container">
      <!-- Sidebar -->
      <div id="sidebar-container"></div>

      <!-- MAIN -->
      <div class="main-content">
        <!-- Header -->
        <div id="header-container"></div>

        <div class="welcome-section cv-title">
          <h2>InveFact</h2>
          <p>REGISTRO USUARIO</p>
        </div>

        <form id="form-usuario" class="form-columns">
          <div class="columns-wrapper">

            <!-- COLUMNA IZQUIERDA -->
            <div class="form-column">
              <input
                type="text"
                class="formulario_registro1"
                placeholder="Digita Nombres"
                name="nombres"
                required
              />

              <input
                type="text"
                class="formulario_registro1"
                placeholder="Digita Apellidos"
                name="apellidos"
                required
              />

              <input
                type="text"
                class="formulario_registro1"
                placeholder="Digita Documento de Identificación"
                name="cedula"
                required
              />

              <input
                type="email"
                class="formulario_registro2"
                placeholder="Digita Correo Electrónico"
                name="correo"
                required
              />

              <input
                type="number"
                class="formulario_registro2"
                placeholder="Digita N° Telefónico"
                name="telefono"
              />
            </div>

            <!-- COLUMNA DERECHA -->
            <div class="form-column">
              <input
                type="text"
                class="formulario_registro1"
                placeholder="Digita Nombre de Usuario"
                name="usuario"
                required
              />

              <select
                class="formulario_registro1"
                name="rol"
                required
              >
                <option value="" selected disabled>
                  Selecciona un rol
                </option>
                <option value="admin">ADMIN</option>
                <option value="cajero">CAJERO</option>
                <option value="contadora">CONTADORA</option>
              </select>

              <select
                class="formulario_registro1"
                name="estado"
                required
              >
                <option value="" selected disabled>
                  Selecciona estado
                </option>
                <option value="activo">ACTIVO</option>
                <option value="inactivo">INACTIVO</option>
              </select>

              <input
                type="password"
                class="formulario_registro2"
                placeholder="Digita la Contraseña"
                name="contrasena"
                required
              />

              <input
                type="password"
                class="formulario_registro2"
                placeholder="Repite la Contraseña"
                name="confirmar_contrasena"
                required
              />
            </div>

          </div>

          <!-- BOTÓN -->
          <button type="submit" class="boton-animado">
            <span class="brillo1"></span>
            <span class="texto1">Registrar</span>
          </button>
        </form>
      </div>
    </div>

    <!-- JS EXISTENTES -->
    <script src="logicajs/loadSidebar.js" defer></script>
    <script src="logicajs/loadheader.js" defer></script>
    <script src="logicajs/sidebar.js" defer></script>
    <script src="logicajs/roles.js"></script>
    <script src="logicajs/regresar.js" defer></script>
    <script src="logicajs/header.js"></script>
    <script src="logicajs/guard.js"></script>
    <!-- JS REGISTRO USUARIO -->
    <script src="logicajs/registro_usuario.js" defer></script>
  </body>
</html>
