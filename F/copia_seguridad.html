<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InveFact - Consulta de Ventas</title>

    <!-- Tus estilos generales -->
    <link rel="stylesheet" href="estilosD1.css" />
  </head>

  <!-- ✅ AISLADO: esta clase activa solo el CSS/JS de esta pantalla -->
  <body class="app-body consulta-ventas-body" data-permiso="configuracion">
    <div class="container">
      <!-- Sidebar cargado dinámicamente -->
      <div id="sidebar-container"></div>
      <!-- MAIN -->
      <div class="main-content">
        <!-- ENCABEZADO DINÁMICO -->
        <div id="header-container"></div>
        <div class="welcome-section cv-title">
          <h2>InveFact</h2>
          <p>COPIA DE SEGURIDAD</p>
        </div>

        <div class="cs-scope">
          <div class="cs-card">

            <button class="cs-btn-green">
              Realizar copia de seguridad Ahora
            </button>

            <h3 class="cs-subtitle">Historial copia de Seguridad</h3>

            <table class="cs-table">
              <thead>
                <tr>
                  <th>Fecha</th>
                  <th>Hora</th>
                  <th>Estado</th>
                  <th>Acción</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>15-01-2026</td>
                  <td>15:30</td>
                  <td><span class="cs-badge ok">Exitosa</span></td>
                  <td><button class="cs-btn-blue">Descargar</button></td>
                </tr>
              </tbody>
            </table>

            <h3 class="cs-subtitle">
              Configuración copias de seguridad Automáticas
            </h3>

            <div class="cs-config">
              <label>Realizar copia de seguridad</label>
              <select>
                <option>Diario</option>
                <option>Semanal</option>
              </select>

              <label>Hora de la Copia</label>
              <select>
                <option>02:00 am</option>
                <option>04:00 am</option>
              </select>
            </div>

            <button class="cs-btn-green">Guardar cambios</button>
          </div>
        </div>
      </div>
    </div>
    <script src="logicajs/loadSidebar.js" defer></script>
    <script src="logicajs/loadheader.js" defer></script>
    <script src="logicajs/sidebar.js" defer></script>
    <script src="logicajs/regresar.js" defer></script>
    <script src="logicajs/header.js"></script>
    <script src="logicajs/roles.js"></script>
    <script src="logicajs/guard.js"></script>
  </body>
</html>
