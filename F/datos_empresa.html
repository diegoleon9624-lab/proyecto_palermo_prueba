<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InveFact - Consulta de Ventas</title>

    <!-- Tus estilos generales -->
    <link rel="stylesheet" href="estilosD1.css" />
  </head>

  <!-- ✅ AISLADO: esta clase activa solo el CSS/JS de esta pantalla -->
  <body class="app-body consulta-ventas-body" data-permiso="configuracion">
    <div class="container">
      <!-- Sidebar cargado dinámicamente -->
      <div id="sidebar-container"></div>
      <!-- MAIN -->
      <div class="main-content">
        <!-- ENCABEZADO DINÁMICO -->
        <div id="header-container"></div>
        <div class="welcome-section cv-title">
          <h2>InveFact</h2>
          <p>DATOS DE LA EMPRESA</p>
        </div>

        <div class="de-scope">
          <div class="de-card">
            <p class="de-subtitle">Actualiza los datos básicos de tu empresa</p>

            <div class="de-grid">
              <div class="de-form">
                <label>Nombre de la Empresa</label>
                <input
                  type="text"
                  placeholder="Digita el nombre completo de Empresa"
                />

                <label>NIT</label>
                <input type="text" placeholder="Digita el NIT" />

                <label>Dirección</label>
                <input
                  type="text"
                  placeholder="Digita la dirección de la empresa"
                />

                <label>Correo</label>
                <input
                  type="email"
                  placeholder="Digita el correo electrónico"
                />

                <label>Teléfono</label>
                <input type="text" placeholder="Digita el teléfono" />
              </div>

              <div class="de-logo">
                <img src="img/logo_empresa.png" alt="Logo Empresa" />
                <button class="de-btn-secondary">Subir nuevo logo</button>
              </div>
            </div>

            <button class="de-btn-primary">Guardar cambios</button>
          </div>
        </div>
      </div>
    </div>
    <script src="logicajs/loadSidebar.js" defer></script>
    <script src="logicajs/loadheader.js" defer></script>
    <script src="logicajs/sidebar.js" defer></script>
    <script src="logicajs/regresar.js" defer></script>
    <script src="logicajs/header.js"></script>
    <script src="logicajs/roles.js"></script>
    <script src="logicajs/guard.js"></script>
  </body>
</html>
