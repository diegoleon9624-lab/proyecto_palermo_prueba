<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InveFact - Consulta de Ventas</title>

    <!-- Tus estilos generales -->
    <link rel="stylesheet" href="estilosD1.css" />
  </head>

  <!-- ✅ AISLADO: esta clase activa solo el CSS/JS de esta pantalla -->
  <body class="app-body consulta-ventas-body"  data-permiso="reportes">
    <div class="container">
      <!-- Sidebar cargado dinámicamente -->
      <div id="sidebar-container"></div>
      <!-- MAIN -->
      <div class="main-content">
        <!-- ENCABEZADO DINÁMICO -->
        <div id="header-container"></div>
        <div class="welcome-section cv-title">
          <h2>InveFact</h2>
          <p>REPORTES DE VENTAS DIARIAS</p>
        </div>

        <div class="rvd-scope">
          <div class="rvd-card">
            <div class="rvd-filtros">
              <div class="rvd-field">
                <label>Desde</label>
                <input type="date" />
              </div>
              <div class="rvd-field">
                <label>Hasta</label>
                <input type="date" />
              </div>
            </div>

            <div class="rvd-table-wrap">
              <table class="rvd-table">
                <thead>
                  <tr>
                    <th>Fecha</th>
                    <th>Total ventas</th>
                    <th>N° facturas</th>
                    <th>Total facturado</th>
                    <th>Factura POS</th>
                    <th>Factura Crédito</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>06/01/2025</td>
                    <td>$2.153.472</td>
                    <td>72</td>
                    <td>$5.352.830</td>
                    <td>32</td>
                    <td>40</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="logicajs/loadSidebar.js" defer></script>
    <script src="logicajs/loadheader.js" defer></script>
    <script src="logicajs/sidebar.js" defer></script>
    <script src="logicajs/regresar.js" defer></script>
    <script src="logicajs/header.js"></script>
    <script src="logicajs/roles.js"></script>
    <script src="logicajs/guard.js"></script>
  </body>
</html>
