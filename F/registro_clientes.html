<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InveFact - Consulta de Ventas</title>

    <!-- Tus estilos generales -->
    <link rel="stylesheet" href="estilosD1.css" />
  </head>

  <!-- ✅ AISLADO: esta clase activa solo el CSS/JS de esta pantalla -->
  <body class="app-body consulta-ventas-body body-registro" data-permiso="clientes">
    <div class="container">
      <!-- Sidebar cargado dinámicamente -->
      <div id="sidebar-container"></div>

      <!-- MAIN -->
      <div class="main-content">
        <!-- ENCABEZADO DINÁMICO -->
        <div id="header-container"></div>

        <div class="welcome-section cv-title">
          <h2>InveFact</h2>
          <p>REGISTRO CLIENTE</p>
        </div>

        <form id="formCliente" class="form-columns">
          <div class="columns-wrapper">
            <div class="form-column">

              <input
                type="text"
                class="formulario_registro1"
                placeholder="Digita Nombres"
                name="nombres"
                required
              />

              <input
                type="text"
                class="formulario_registro1"
                placeholder="Digita Apellidos"
                name="apellidos"
                required
              />

              <input
                type="email"
                class="formulario_registro2"
                placeholder="Digita Correo Electrónico"
                name="correo"
                required
              />

              <!-- 🔧 era type=email (error), ahora text -->
              <input
                type="text"
                class="formulario_registro1"
                placeholder="Digita La Dirección"
                name="direccion"
                required
              />

              <!-- 🔧 se agrega name (no cambia estilo) -->
              <select
                class="formulario_registro1"
                name="estado_cliente"
                aria-label="Default select example"
              >
                <option selected>Estado del Cliente</option>
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
              </select>

            </div>

            <div class="form-column">

              <input
                type="text"
                class="formulario_registro2"
                placeholder="Digita el N° de Identificacion/NIT"
                name="cedula_o_nit"
                required
              />

              <input
                type="text"
                class="formulario_registro2"
                placeholder="Digita N° Telefonico"
                name="telefono"
                required
              />

              <!-- 🔧 se quitó el punto que rompía HTML -->
              <input
                type="text"
                class="formulario_registro1"
                placeholder="Digita El Cupo"
                name="cupo"
                required
              />

              <!-- 🔧 se agrega name (CLAVE) -->
              <select
                class="formulario_registro1"
                name="tipo_cliente"
                aria-label="Default select example"
              >
                <option selected>Tipo de Cliente</option>
                <option value="contado">CONTADO</option>
                <option value="credito">CREDITO</option>
              </select>

            </div>
          </div>

          <button type="submit" class="boton-animado">
            <span class="brillo1"></span>
            <span class="texto1">Registrar</span>
          </button>
        </form>
      </div>
    </div>

    <!-- JS existentes (NO se tocan) -->
    <script src="logicajs/loadSidebar.js" defer></script>
    <script src="logicajs/loadheader.js" defer></script>
    <script src="logicajs/sidebar.js" defer></script>
    <script src="logicajs/regresar.js" defer></script>
    <script src="logicajs/header.js"></script>
    <script src="logicajs/roles.js"></script>
    <script src="logicajs/guard.js"></script>
    <!-- ✅ JS de registro (necesario) -->
    <script src="logicajs/registroClientes.js" defer></script>
  </body>
</html>
